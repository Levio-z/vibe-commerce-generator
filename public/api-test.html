<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>API测试页面</title>
  <style>
    body { font-family: sans-serif; max-width: 800px; margin: 50px auto; padding: 20px; }
    button { padding: 10px 20px; font-size: 16px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 5px; }
    button:disabled { background: #ccc; cursor: not-allowed; }
    #log { background: #f5f5f5; padding: 20px; border-radius: 5px; margin-top: 20px; max-height: 400px; overflow-y: auto; }
    #result { margin-top: 20px; }
    #result img { max-width: 100%; border: 1px solid #ddd; border-radius: 5px; }
    .log-item { margin: 5px 0; padding: 5px; border-bottom: 1px solid #eee; }
    .success { color: green; }
    .error { color: red; }
    .info { color: blue; }
  </style>
</head>
<body>
  <h1>豆包文生图API测试</h1>

  <button id="testBtn" onclick="runTest()">运行API测试</button>

  <div id="log"></div>

  <div id="result"></div>

  <script>
    // 从环境变量读取API配置（构建时注入）
    const API_KEY = '{{VITE_DOUBAN_API_KEY}}';
    const API_ENDPOINT = '{{VITE_DOUBAN_API_ENDPOINT}}';

    // 检查API Key配置
    if (!API_KEY) {
      document.body.innerHTML += '<p style="color: red; margin-top: 20px;">⚠️ 请先配置 .env 文件中的 VITE_DOUBAN_API_KEY</p>';
    }

    const testPrompt = '韩版宽松连帽卫衣，品类:服装，品牌:潮流前线，材质:80%棉+20%聚酯纤维，颜色:经典黑，适用人群:女士，电商主图风格，白色背景，产品居中展示，高清摄影棚灯光，专业商业拍摄';

    function log(message, type = 'info') {
      const logDiv = document.getElementById('log');
      const item = document.createElement('div');
      item.className = `log-item ${type}`;
      item.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
      logDiv.appendChild(item);
      logDiv.scrollTop = logDiv.scrollHeight;
    }

    async function runTest() {
      const btn = document.getElementById('testBtn');
      const resultDiv = document.getElementById('result');
      btn.disabled = true;
      resultDiv.innerHTML = '';

      log('开始测试...');
      log('提示词: ' + testPrompt);

      const body = {
        model: 'doubao-seedream-4-0-250828',
        prompt: testPrompt,
        size: '2048x2048',
        watermark: false,
        response_format: 'url',
        stream: true,
        sequential_image_generation: 'disabled'
      };

      try {
        log('发送请求...');
        const response = await fetch(API_ENDPOINT, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${API_KEY}`,
          },
          body: JSON.stringify(body)
        });

        log(`响应状态: ${response.status} ${response.statusText}`);

        if (!response.ok) {
          const errorText = await response.text();
          log(`请求失败: ${errorText}`, 'error');
          btn.disabled = false;
          return;
        }

        const images = [];
        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';

        log('开始读取流式响应...');

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop() || '';

          for (const line of lines) {
            if (line.startsWith('data: ')) {
              const data = line.slice(6).trim();
              if (!data || data === '[DONE]') continue;

              try {
                const event = JSON.parse(data);
                log(`收到事件: ${event.type}`);

                if (event.type === 'image_generation.partial_succeeded') {
                  log(`图片生成成功! URL: ${event.url.substring(0, 80)}...`, 'success');
                  images.push(event.url);

                  // 立即显示图片
                  resultDiv.innerHTML = `<h3>生成的主图:</h3><img src="${event.url}" alt="生成的图片" />`;
                }

                if (event.type === 'image_generation.partial_failed') {
                  log(`图片生成失败: ${event.error?.message}`, 'error');
                }

                if (event.type === 'image_generation.completed') {
                  log(`生成完成! 共 ${event.usage?.generated_images || 0} 张图片`, 'success');
                  log(`总Token: ${event.usage?.total_tokens || 0}`);
                }
              } catch (e) {
                log(`解析错误: ${e.message}`, 'error');
              }
            }
          }
        }

        log('流式响应读取完成');
        log(`共生成 ${images.length} 张图片`);

      } catch (error) {
        log(`错误: ${error.message}`, 'error');
      }

      btn.disabled = false;
    }
  </script>
</body>
</html>
