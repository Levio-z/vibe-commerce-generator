<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <!-- 渐变背景 -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>

    <!-- 蓝色渐变 -->
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4facfe"/>
      <stop offset="100%" style="stop-color:#00f2fe"/>
    </linearGradient>

    <!-- 紫色渐变 -->
    <linearGradient id="purpleGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>

    <!-- 按钮渐变 -->
    <linearGradient id="buttonGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="50%" style="stop-color:#764ba2"/>
      <stop offset="100%" style="stop-color:#f093fb"/>
    </linearGradient>

    <!-- 发光效果 -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- 阴影 -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.3"/>
    </filter>

    <!-- 网格图案 -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-width="0.5" opacity="0.1"/>
    </pattern>
  </defs>

  <!-- 背景 -->
  <rect width="1200" height="400" fill="url(#bgGradient)"/>
  <rect width="1200" height="400" fill="url(#grid)"/>

  <!-- 装饰圆环 -->
  <circle cx="100" cy="350" r="150" fill="none" stroke="#667eea" stroke-width="1" opacity="0.2"/>
  <circle cx="1100" cy="50" r="120" fill="none" stroke="#00f2fe" stroke-width="1" opacity="0.2"/>

  <!-- 装饰粒子 -->
  <g opacity="0.6">
    <circle cx="200" cy="80" r="3" fill="#4facfe">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1000" cy="120" r="4" fill="#f093fb">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="300" cy="320" r="3" fill="#00f2fe">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="900" cy="350" r="3" fill="#667eea">
      <animate attributeName="opacity" values="0.3;0.8;0.3" dur="3.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="150" cy="200" r="2" fill="#764ba2">
      <animate attributeName="opacity" values="0.2;0.7;0.2" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1050" cy="280" r="2" fill="#4facfe">
      <animate attributeName="opacity" values="0.3;0.9;0.3" dur="2.8s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- 标题区域 -->
  <g filter="url(#glow)">
    <!-- 主标题 -->
    <text x="600" y="120" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="700" fill="#ffffff">
      电商内容智能生成工具
    </text>

    <!-- 副标题 -->
    <text x="600" y="165" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="400" fill="#a5b4fc">
      基于 AI 的电商运营效率工具 | Vibe Coding 最佳实践
    </text>
  </g>

  <!-- 核心功能卡片 -->
  <g transform="translate(120, 200)">
    <!-- 卡片1: 图文生成 -->
    <g filter="url(#shadow)">
      <rect x="0" y="0" width="200" height="120" rx="12" fill="#1e293b" opacity="0.8"/>
      <rect x="0" y="0" width="200" height="120" rx="12" fill="url(#blueGradient)" opacity="0.1"/>
      <rect x="2" y="2" width="196" height="3" rx="1.5" fill="url(#blueGradient)"/>

      <!-- 图标 -->
      <g transform="translate(20, 25)">
        <rect width="40" height="40" rx="8" fill="url(#blueGradient)"/>
        <path d="M12 15 L28 15 M12 20 L28 20 M12 25 L22 25" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
        <circle cx="30" cy="27" r="4" fill="none" stroke="#fff" stroke-width="2"/>
      </g>

      <text x="20" y="90" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="#fff">商品任务</text>
      <text x="20" y="108" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8">一键生成图文内容</text>
    </g>

    <!-- 卡片2: 模板库 -->
    <g filter="url(#shadow)" transform="translate(250, 0)">
      <rect x="0" y="0" width="200" height="120" rx="12" fill="#1e293b" opacity="0.8"/>
      <rect x="0" y="0" width="200" height="120" rx="12" fill="url(#purpleGradient)" opacity="0.1"/>
      <rect x="2" y="2" width="196" height="3" rx="1.5" fill="url(#purpleGradient)"/>

      <!-- 图标 -->
      <g transform="translate(20, 25)">
        <rect width="40" height="40" rx="8" fill="url(#purpleGradient)"/>
        <rect x="10" y="12" width="20" height="16" rx="2" fill="none" stroke="#fff" stroke-width="2"/>
        <line x1="14" y1="17" x2="26" y2="17" stroke="#fff" stroke-width="2"/>
        <line x1="14" y1="21" x2="24" y2="21" stroke="#fff" stroke-width="2"/>
      </g>

      <text x="20" y="90" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="#fff">模板库</text>
      <text x="20" y="108" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8">收藏复用优质模板</text>
    </g>

    <!-- 卡片3: AI生图 -->
    <g filter="url(#shadow)" transform="translate(500, 0)">
      <rect x="0" y="0" width="200" height="120" rx="12" fill="#1e293b" opacity="0.8"/>
      <rect x="0" y="0" width="200" height="120" rx="12" fill="url(#buttonGradient)" opacity="0.1"/>
      <rect x="2" y="2" width="196" height="3" rx="1.5" fill="url(#buttonGradient)"/>

      <!-- 图标 -->
      <g transform="translate(20, 25)">
        <rect width="40" height="40" rx="8" fill="url(#buttonGradient)"/>
        <path d="M20 10 L28 18 L20 26 L12 18 Z" fill="none" stroke="#fff" stroke-width="2"/>
        <circle cx="20" cy="18" r="4" fill="#fff"/>
      </g>

      <text x="20" y="90" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="#fff">AI生图</text>
      <text x="20" y="108" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8">豆包API智能生成</text>
    </g>

    <!-- 卡片4: 设置中心 -->
    <g filter="url(#shadow)" transform="translate(750, 0)">
      <rect x="0" y="0" width="200" height="120" rx="12" fill="#1e293b" opacity="0.8"/>
      <rect x="0" y="0" width="200" height="120" rx="12" fill="#10b981" opacity="0.1"/>
      <rect x="2" y="2" width="196" height="3" rx="1.5" fill="#10b981"/>

      <!-- 图标 -->
      <g transform="translate(20, 25)">
        <rect width="40" height="40" rx="8" fill="#10b981"/>
        <circle cx="20" cy="18" r="6" fill="none" stroke="#fff" stroke-width="2"/>
        <path d="M20 14 L20 18 L23 20" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
      </g>

      <text x="20" y="90" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="#fff">设置中心</text>
      <text x="20" y="108" font-family="system-ui, sans-serif" font-size="12" fill="#94a3b8">灵活配置参数</text>
    </g>
  </g>

  <!-- 技术栈标签 -->
  <g transform="translate(0, 360)">
    <text x="600" y="0" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#64748b">
      技术栈：
    </text>

    <g transform="translate(310, -18)">
      <!-- React -->
      <rect width="70" height="26" rx="13" fill="#61dafb" opacity="0.2"/>
      <text x="35" y="17" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#61dafb">React</text>

      <!-- TypeScript -->
      <rect x="80" width="90" height="26" rx="13" fill="#3178c6" opacity="0.2"/>
      <text x="125" y="17" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#3178c6">TypeScript</text>

      <!-- Vite -->
      <rect x="180" width="60" height="26" rx="13" fill="#646cff" opacity="0.2"/>
      <text x="210" y="17" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#646cff">Vite</text>

      <!-- Tailwind -->
      <rect x="250" width="80" height="26" rx="13" fill="#38bdf8" opacity="0.2"/>
      <text x="290" y="17" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#38bdf8">Tailwind</text>

      <!-- 豆包AI -->
      <rect x="340" width="80" height="26" rx="13" fill="#f472b6" opacity="0.2"/>
      <text x="380" y="17" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#f472b6">豆包AI</text>

      <!-- Vibe Coding -->
      <rect x="430" width="100" height="26" rx="13" fill="#a78bfa" opacity="0.2"/>
      <text x="480" y="17" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#a78bfa">Vibe Coding</text>
    </g>
  </g>

  <!-- 底部标语 -->
  <text x="600" y="390" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#475569">
    让 AI 成为你的开发搭档 | 从需求到落地的完整实践
  </text>
</svg>
